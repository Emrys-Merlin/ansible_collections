---
# defaults file for emrys_merlin.rpi.victoria_metrics

# Single-node Victoria Metrics deployment.
victoria_metrics_version: v1.147.0
victoria_metrics_location: "{{ docker_dir }}/victoria_metrics"
victoria_metrics_port: 8428
# Retention period, see https://docs.victoriametrics.com/#retention
# (a bare number is months; units h/d/w/y also work). "100y" keeps data
# effectively forever — VictoriaMetrics has no literal "infinite" setting.
victoria_metrics_retention: "100y"

# Home Assistant scrape (pull). Turn on once HA's `prometheus:` integration is
# enabled and a long-lived access token is available via victoria_metrics_ha_token.
victoria_metrics_scrape_homeassistant: false
victoria_metrics_scrape_interval: 60s
victoria_metrics_ha_scheme: http
victoria_metrics_ha_host: homeassistant.local
victoria_metrics_ha_port: 8123
# HA long-lived access token; set from a 1Password lookup in host/group vars.
victoria_metrics_ha_token: ""
# Only these metric names are stored; everything else HA exposes is dropped.
# Extend as more sensors come online (e.g. carbon dioxide, soil moisture).
victoria_metrics_ha_keep_metrics:
  - homeassistant_sensor_temperature_celsius
  - homeassistant_sensor_humidity_percent
  - homeassistant_sensor_power_w
  - homeassistant_sensor_energy_kwh

# Enrich the kept HA sensor series with a `location` label (HA area) and an
# `integration` label (the entity's config-entry domain), generated from HA at
# deploy time via /api/template. Sensors with no HA area get location=unassigned.
# Requires an HA version with config_entry_id()/config_entry_attr() (verified on
# the emu HA). Set false to fall back to the plain keep-only scrape.
victoria_metrics_ha_enrich_labels: true
# HA-side Jinja rendered server-side by /api/template. Emits a JSON array of
# [entity, area, integration] triples (area/integration are null when HA has none).
# JSON avoids any delimiter/newline/quoting fragility on the Ansible side — it is
# parsed back with from_json. MUST stay wrapped in {% raw %} so Ansible does not
# evaluate the HA constructs (states.sensor, area_name, config_entry_attr) itself.
victoria_metrics_ha_label_template: >-
  {% raw %}
  {%- set ns = namespace(rows=[]) -%}
  {%- for s in states.sensor -%}
  {%- if state_attr(s.entity_id, 'device_class') in ['temperature', 'humidity', 'power', 'energy'] -%}
  {%- set ns.rows = ns.rows + [[s.entity_id, area_name(s.entity_id), config_entry_attr(config_entry_id(s.entity_id), 'domain')]] -%}
  {%- endif -%}
  {%- endfor -%}
  {{ ns.rows | tojson }}
  {% endraw %}
