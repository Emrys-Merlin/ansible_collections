---
# tasks file for collections/ansible_collections/emrys_merlin/uberspace/roles/prometheus
- name: Create db directory
  ansible.builtin.file:
    path: "~/var/lib/prometheus"
    state: directory
    mode: "0755"

- name: Create config directory
  ansible.builtin.file:
    path: "~/etc/prometheus"
    state: directory
    mode: "0755"

- name: Check if prometheus is already installed
  ansible.builtin.stat:
    path: "~/bin/prometheus{{ prometheus_version }}"
  register: prometheus_installed

- name: Create temporary directory
  ansible.builtin.tempfile:
    state: directory
  register: temp_dir
  when: not prometheus_installed.stat.exists

- name: Download prometheus archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "{{ temp_dir.path }}/prometheus.tar.gz"
    mode: "0644"
  when: not prometheus_installed.stat.exists

- name: Extract prometheus archive
  ansible.builtin.unarchive:
    src: "{{ temp_dir.path }}/prometheus.tar.gz"
    dest: "{{ temp_dir.path }}"
    remote_src: true
  when: not prometheus_installed.stat.exists

- name: Move prometheus binary to bin directory
  ansible.builtin.copy:
    src: "{{ temp_dir.path }}/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: "~/bin/prometheus{{ prometheus_version }}"
    mode: "0755"
    remote_src: true
  when: not prometheus_installed.stat.exists

- name: Delete temporary directory
  ansible.builtin.file:
    path: "{{ temp_dir.path }}"
    state: absent
  when: not prometheus_installed.stat.exists

- name: Update link to prometheus binary
  ansible.builtin.file:
    src: "~/bin/prometheus{{ prometheus_version }}"
    dest: "~/bin/prometheus"
    state: link
  notify:
    - Restart service

- name: Create prometheus configuration
  ansible.builtin.template:
    src: "templates/prometheus.yml.j2"
    dest: "~/etc/prometheus/prometheus.yml"
    mode: "0644"
  notify:
    - Restart service

- name: Create supervisorctl prometheus service
  ansible.builtin.template:
    src: "templates/prometheus.ini.j2"
    dest: "~/etc/supervisor.d/prometheus.ini"
    mode: "0644"
  notify:
    - Reread supervisorctl
    - Restart service
